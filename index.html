<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>咪咪日誌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }
        body { 
            background-color: #f8fafc; 
            font-family: 'Noto Sans TC', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            padding-top: var(--safe-top); /* 適應瀏海 */
        }
        .slate-panel { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 28px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04); }
        .check-item { 
            @apply flex flex-col items-center justify-center py-4 rounded-[22px] transition-all duration-300 border-2 border-slate-50 bg-white shadow-sm relative overflow-hidden; 
            aspect-ratio: 1 / 1; /* 強制正方形更像 App 按鈕 */
            touch-action: manipulation; 
        }
        .check-icon-empty { @apply text-xl opacity-20 mb-1 transition-all; }
        .check-item.active { @apply bg-slate-800 border-slate-700 shadow-lg scale-[0.96]; }
        .check-item.active .label-text { @apply text-white !important; }
        .check-item.active .time-text { @apply text-slate-400 !important; }
        .check-item.active .check-icon-empty { @apply scale-125 opacity-100; }
        .check-item:active { transform: scale(0.92); }
        .label-text { font-size: 0.9rem; font-weight: 800; color: #334155; white-space: nowrap; }
        .time-text { font-size: 0.65rem; font-weight: 600; color: #94a3b8; }
        .tag-btn { @apply px-3 py-1.5 rounded-xl bg-white text-slate-700 font-bold text-xs border-2 border-slate-100 active:bg-slate-50 transition-all; }
        .section-title { @apply text-xl font-black text-slate-800 tracking-tight flex items-center mb-4 px-1; }
        .observation-panel { background: #e2e8f0; border: none; }
        #auth-overlay { position: fixed; inset: 0; background: #f8fafc; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-4 pb-24 text-slate-800">

    <div id="auth-overlay">
        <div class="text-center p-8 bg-white rounded-[40px] shadow-2xl border border-slate-200 max-w-xs w-full mx-4">
            <div class="text-5xl mb-6">🔒</div>
            <h2 class="text-xl font-black text-slate-800 mb-6 tracking-tight">請輸入密碼</h2>
            <input type="password" id="passInput" pattern="\d*" inputmode="numeric" placeholder="••••" 
                class="w-full text-center text-3xl tracking-[0.5em] p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl mb-6 outline-none focus:border-slate-800 transition-all">
            <button onclick="verifyPass()" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-black tracking-widest active:scale-95 transition-all text-lg shadow-lg">進入系統</button>
        </div>
    </div>

    <div id="main-content" class="max-w-md mx-auto space-y-8 opacity-0 transition-opacity duration-700 pointer-events-none">
        
        <div class="flex justify-between items-end px-1">
            <div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tighter italic">MIMI HEALTH</h1>
                <p id="dateBanner" class="text-[10px] text-slate-400 font-bold tracking-[0.2em] mt-1 uppercase"></p>
            </div>
            <button onclick="exportToCSV()" class="bg-slate-200 text-slate-600 px-4 py-2 rounded-xl font-black text-[10px] tracking-widest">CSV</button>
        </div>

        <section>
            <div class="slate-panel p-5 border-t-[8px] border-t-slate-700">
                <h2 class="text-[9px] font-black text-slate-400 tracking-[0.3em] uppercase mb-5 flex items-center">
                    <span class="w-1.5 h-3 bg-slate-700 rounded-full mr-2"></span> Medication
                </h2>
                <div class="space-y-4">
                    <div class="flex justify-between items-center px-1">
                        <span class="text-lg font-black text-slate-700">☀️ 早上給藥</span>
                        <span id="prog-morning" class="text-[10px] font-black bg-slate-100 px-2 py-0.5 rounded-full text-slate-500">0/3</span>
                    </div>
                    <div class="grid grid-cols-3 gap-2.5">
                        <button onclick="cloudToggle('早上-💊1')" id="box-m0" class="check-item"><span id="icon-m0" class="check-icon-empty">⬜</span><span class="label-text">💊癲癇1</span><span id="time-m0" class="time-text">--:--</span></button>
                        <button onclick="cloudToggle('早上-💊2')" id="box-m1" class="check-item"><span id="icon-m1" class="check-icon-empty">⬜</span><span class="label-text">💊癲癇2</span><span id="time-m1" class="time-text">--:--</span></button>
                        <button onclick="cloudToggle('早上-🌿')" id="box-m2" class="check-item"><span id="icon-m2" class="check-icon-empty">⬜</span><span class="label-text">🌿中藥</span><span id="time-m2" class="time-text">--:--</span></button>
                    </div>
                </div>
                <div class="h-6"></div>
                <div class="space-y-4 pt-5 border-t border-slate-100">
                    <div class="flex justify-between items-center px-1">
                        <span class="text-lg font-black text-slate-700">🌙 晚上給藥</span>
                        <span id="prog-night" class="text-[10px] font-black bg-slate-100 px-2 py-0.5 rounded-full text-slate-500">0/4</span>
                    </div>
                    <div class="grid grid-cols-4 gap-2">
                        <button onclick="cloudToggle('晚上-💊1')" id="box-n0" class="check-item"><span id="icon-n0" class="check-icon-empty text-base">⬜</span><span class="label-text text-[0.75rem]">💊1</span><span id="time-n0" class="time-text text-[0.6rem]">--:--</span></button>
                        <button onclick="cloudToggle('晚上-💊2')" id="box-n1" class="check-item"><span id="icon-n1" class="check-icon-empty text-base">⬜</span><span class="label-text text-[0.75rem]">💊2</span><span id="time-n1" class="time-text text-[0.6rem]">--:--</span></button>
                        <button onclick="cloudToggle('晚上-🌿')" id="box-n2" class="check-item"><span id="icon-n2" class="check-icon-empty text-base">⬜</span><span class="label-text text-[0.75rem]">🌿</span><span id="time-n2" class="time-text text-[0.6rem]">--:--</span></button>
                        <button onclick="cloudToggle('晚上-🩸')" id="box-n3" class="check-item"><span id="icon-n3" class="check-icon-empty text-base">⬜</span><span class="label-text text-[0.75rem]">🩸</span><span id="time-n3" class="time-text text-[0.6rem]">--:--</span></button>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <div class="slate-panel p-5 observation-panel">
                <h2 class="text-[9px] font-black text-slate-500 tracking-[0.3em] uppercase mb-5 flex items-center">
                    <span class="w-1.5 h-3 bg-slate-500 rounded-full mr-2"></span> Observation
                </h2>
                <div class="flex gap-2 mb-3">
                    <input type="date" id="symDate" class="flex-[3] p-3 bg-white rounded-xl font-bold text-sm focus:ring-2 ring-slate-400 outline-none transition-all">
                    <input type="time" id="symTime" class="flex-[3] p-3 bg-white rounded-xl font-bold text-sm focus:ring-2 ring-slate-400 outline-none transition-all">
                    <button onclick="resetInputTime()" class="flex-1 bg-slate-800 text-white rounded-xl font-black text-[9px]">現在</button>
                </div>
                <div class="flex flex-wrap gap-1.5 mb-4">
                    <button onclick="addTag('✨ 精神好')" class="tag-btn">✨ 精神好</button>
                    <button onclick="addTag('💩 便便正常')" class="tag-btn">💩 便便</button>
                    <button onclick="addTag('🤮 嘔吐')" class="tag-btn">🤮 嘔吐</button>
                    <button onclick="addTag('🚨 癲癇發作')" class="px-3 py-1.5 rounded-xl bg-red-600 text-white font-black text-xs animate-pulse">🚨 發作</button>
                </div>
                <textarea id="noteInput" placeholder="描述細節..." class="w-full p-4 bg-white/60 rounded-2xl text-base mb-4 outline-none border-2 border-transparent focus:border-slate-400 h-24 transition-all placeholder:text-slate-400"></textarea>
                <div class="flex gap-2">
                    <button onclick="clearInput()" class="flex-1 bg-slate-400 text-white py-4 rounded-2xl font-black active:scale-95 transition-all shadow-md">清除</button>
                    <button onclick="cloudSaveSymptom()" class="flex-[2] bg-slate-800 text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all">儲存紀錄</button>
                </div>
            </div>
        </section>

        <hr class="border-slate-200 mx-2">

        <div class="space-y-10 pb-20">
            <section>
                <h2 class="section-title text-slate-600 text-lg">📖 給藥歷史</h2>
                <div id="medList" class="space-y-3 px-1"></div>
            </section>
            <section>
                <h2 class="section-title text-slate-600 text-lg">📝 症狀觀察</h2>
                <div id="symptomList" class="space-y-3 px-1"></div>
            </section>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, doc, where, getDocs, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const SECRET = "0410";
        const firebaseConfig = {
          apiKey: "AIzaSyB1ZbRISZunnzBapdMk-VZiYbq2PFIU7Vw",
          authDomain: "mimi-healthy.firebaseapp.com",
          projectId: "mimi-healthy",
          storageBucket: "mimi-healthy.firebasestorage.app",
          messagingSenderId: "550078016256",
          appId: "1:550078016256:web:35d24f96fb33a478f7a1e5",
          measurementId: "G-V0T6833N71"
        };

        window.verifyPass = () => {
            const val = document.getElementById('passInput').value;
            if (val === SECRET) {
                localStorage.setItem('mimi_auth_v3', SECRET);
                startApp();
            } else {
                alert("密碼錯誤，請重新輸入。");
                document.getElementById('passInput').value = '';
            }
        };

        function startApp() {
            document.getElementById('auth-overlay').style.display = 'none';
            const main = document.getElementById('main-content');
            main.classList.remove('opacity-0', 'pointer-events-none');
            
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const recordsCol = collection(db, "cat_records");

            const q = query(recordsCol, orderBy("timestamp", "desc"), limit(60));
            onSnapshot(q, (snapshot) => {
                const records = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderUI(records, db, recordsCol);
            });

            window.cloudToggle = async (name) => {
                const today = new Date().toISOString().split('T')[0];
                const qCheck = query(recordsCol, where("date", "==", today), where("content", "==", name + " (完成)"));
                const check = await getDocs(qCheck);
                if (!check.empty) return;
                try {
                    await addDoc(recordsCol, {
                        date: today, time: new Date().toTimeString().substring(0, 5),
                        content: name + " (完成)", type: 'med', timestamp: Date.now()
                    });
                } catch(e) { alert("儲存失敗"); }
            };

            window.cloudSaveSymptom = async () => {
                const content = document.getElementById('noteInput').value.trim();
                if (!content) return;
                try {
                    await addDoc(recordsCol, {
                        date: document.getElementById('symDate').value,
                        time: document.getElementById('symTime').value,
                        content, type: 'symptom', timestamp: Date.now()
                    });
                    document.getElementById('noteInput').value = '';
                } catch(e) { alert("儲存失敗"); }
            };

            window.del = async (id) => {
                if (confirm("確定要刪除這筆紀錄嗎？")) await deleteDoc(doc(db, "cat_records", id));
            };
        }

        if (localStorage.getItem('mimi_auth_v3') === SECRET) { startApp(); }

        function renderUI(records) {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('dateBanner').innerText = "Today: " + today;
            const todayLogs = records.filter(r => r.date === today);
            
            const M_MEDS = ['早上-💊1', '早上-💊2', '早上-🌿'];
            const N_MEDS = ['晚上-💊1', '晚上-💊2', '晚上-🌿', '晚上-🩸'];

            const updateGrid = (meds, prefix) => {
                meds.forEach((name, i) => {
                    const log = todayLogs.find(r => r.content.includes(name));
                    const btn = document.getElementById(`box-${prefix}${i}`);
                    if(btn) {
                        btn.classList.toggle('active', !!log);
                        document.getElementById(`icon-${prefix}${i}`).innerText = log ? "✅" : "⬜";
                        document.getElementById(`time-${prefix}${i}`).innerText = log ? log.time : "--:--";
                    }
                });
            };
            updateGrid(M_MEDS, 'm');
            updateGrid(N_MEDS, 'n');

            document.getElementById('prog-morning').innerText = `${todayLogs.filter(r => M_MEDS.some(m => r.content.includes(m))).length}/3`;
            document.getElementById('prog-night').innerText = `${todayLogs.filter(r => N_MEDS.some(m => r.content.includes(m))).length}/4`;

            const renderList = (data, border) => data.map(r => `
                <div class="bg-white p-4 border-l-[6px] ${r.content.includes('🚨') ? 'border-red-500 bg-red-50' : border} shadow-sm rounded-r-2xl relative mb-3">
                    <div class="flex justify-between items-center mb-1 text-[9px] font-black text-slate-300">
                        <span>${r.date} ${r.time}</span>
                        <button onclick="del('${r.id}')" class="px-2">✕</button>
                    </div>
                    <p class="text-slate-700 text-sm font-bold leading-relaxed">${r.content}</p>
                </div>`).join('');

            document.getElementById('medList').innerHTML = renderList(records.filter(r => r.type === 'med'), 'border-slate-300');
            document.getElementById('symptomList').innerHTML = renderList(records.filter(r => r.type === 'symptom'), 'border-slate-400');
        }

        window.resetInputTime = () => {
            const now = new Date();
            document.getElementById('symDate').value = now.toISOString().split('T')[0];
            document.getElementById('symTime').value = now.toTimeString().substring(0, 5);
        };
        window.clearInput = () => { if (confirm("清空文字？")) document.getElementById('noteInput').value = ''; };
        window.addTag = (tag) => {
            const input = document.getElementById('noteInput');
            input.value = input.value ? input.value + '、' + tag : tag;
        };
        window.exportToCSV = () => alert("匯出請至 Firebase 後台。");
        resetInputTime();
    </script>
</body>
</html>
