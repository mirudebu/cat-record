<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>貓咪癲癇紀錄</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.container{
max-width:520px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

.section{
margin-top:15px;
}

button{
padding:10px;
border:none;
border-radius:6px;
background:#4CAF50;
color:white;
font-size:16px;
width:100%;
margin-top:10px;
}

.seizure{
background:#ff5252;
}

.record{
background:#eee;
margin-top:10px;
padding:10px;
border-radius:6px;
}

textarea{
width:100%;
height:80px;
}
</style>

</head>

<body>

<div class="container">

<h2>🐾 貓咪癲癇紀錄</h2>

<div class="section">
日期  
<input type="date" id="date">
</div>

<div class="section">
<b>癲癇藥A（一天2次）</b><br>
<label><input type="checkbox" id="a_morning"> 早</label><br>
<label><input type="checkbox" id="a_night"> 晚</label>
</div>

<div class="section">
<b>癲癇藥B（8小時一次）</b><br>
<label><input type="checkbox" id="b_morning"> 早</label><br>
<label><input type="checkbox" id="b_noon"> 午</label><br>
<label><input type="checkbox" id="b_night"> 晚</label>
</div>

<div class="section">
症狀紀錄
<textarea id="symptom"></textarea>
</div>

<button onclick="saveRecord()">儲存紀錄</button>

<button class="seizure" onclick="recordSeizure()">⚡ 記錄發作</button>

<h3>歷史紀錄</h3>

<div id="history"></div>

</div>

<script>

let records = JSON.parse(localStorage.getItem("cat_records")) || []
let seizures = JSON.parse(localStorage.getItem("cat_seizures")) || []

function saveRecord(){

let data = {

date:document.getElementById("date").value,

a_morning:document.getElementById("a_morning").checked,
a_night:document.getElementById("a_night").checked,

b_morning:document.getElementById("b_morning").checked,
b_noon:document.getElementById("b_noon").checked,
b_night:document.getElementById("b_night").checked,

symptom:document.getElementById("symptom").value

}

records.push(data)

localStorage.setItem("cat_records",JSON.stringify(records))

showRecords()

}

function recordSeizure(){

let now=new Date().toLocaleString()

seizures.push(now)

localStorage.setItem("cat_seizures",JSON.stringify(seizures))

alert("已記錄發作時間："+now)

showRecords()

}

function showRecords(){

let html=""

records.forEach(r=>{

html+=`
<div class="record">
<b>${r.date}</b><br>
A早:${r.a_morning?"✔":"✘"} A晚:${r.a_night?"✔":"✘"}<br>
B早:${r.b_morning?"✔":"✘"} B午:${r.b_noon?"✔":"✘"} B晚:${r.b_night?"✔":"✘"}<br>
症狀:${r.symptom}
</div>
`
})

if(seizures.length>0){

html+="<h4>⚡ 發作紀錄</h4>"

seizures.forEach(s=>{
html+=`<div class="record">${s}</div>`
})

}

document.getElementById("history").innerHTML=html

}

showRecords()

</script>

</body>
</html>
